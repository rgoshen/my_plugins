name: Release plugins

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to release (e.g. cs-tutor). Defaults to all changed."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugins to release
        id: changes
        env:
          PLUGIN_INPUT: ${{ github.event.inputs.plugin }}
        run: |
          if [ -n "${PLUGIN_INPUT}" ]; then
            # Resolve a plugin name to its directory by matching plugin.json "name".
            DIRS=$(find plugins -path '*/.claude-plugin/plugin.json' | while read -r pj; do
              name=$(jq -r '.name' "$pj")
              if [ "$name" = "$PLUGIN_INPUT" ]; then dirname "$(dirname "$pj")"; fi
            done | sort -u | tr '\n' ' ')
            if [ -z "${DIRS// /}" ]; then
              echo "::error::No plugin found with name '${PLUGIN_INPUT}'. Check the 'name' field in a plugin.json."
              exit 1
            fi
            echo "plugins=${DIRS}" >> "$GITHUB_OUTPUT"
            echo "Manual release dir(s): ${DIRS}"
          else
            # For each changed file under plugins/, walk up to the nearest dir
            # containing .claude-plugin/plugin.json — supports any nesting depth.
            # '|| true' keeps a docs-only push (grep no-match under -eo pipefail)
            # from failing this step; the release step is then skipped on empty.
            DIRS=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep '^plugins/' \
              | while read -r f; do
                  d=$(dirname "$f")
                  while [ "$d" != "." ] && [ "$d" != "/" ]; do
                    if [ -f "$d/.claude-plugin/plugin.json" ]; then echo "$d"; break; fi
                    d=$(dirname "$d")
                  done
                done \
              | sort -u | tr '\n' ' ' || true)
            echo "plugins=${DIRS}" >> "$GITHUB_OUTPUT"
            echo "Detected changed plugin dir(s): ${DIRS}"
          fi

      - name: Create releases for changed plugins
        if: steps.changes.outputs.plugins != ''
        env:
          PLUGIN_DIRS: ${{ steps.changes.outputs.plugins }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASED_ANYTHING=false

          for PLUGIN_DIR in $PLUGIN_DIRS; do
            PLUGIN_JSON="${PLUGIN_DIR}/.claude-plugin/plugin.json"
            CHANGELOG="${PLUGIN_DIR}/CHANGELOG.md"

            [[ ! -f "$PLUGIN_JSON" ]] && { echo "No plugin.json in ${PLUGIN_DIR}, skipping."; continue; }

            PLUGIN=$(jq -r '.name' "$PLUGIN_JSON")
            VERSION=$(jq -r '.version' "$PLUGIN_JSON")
            TAG="${PLUGIN}-v${VERSION}"

            if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
              echo "${TAG} already released, skipping."
              continue
            fi

            # Extract release notes from the matching CHANGELOG section
            NOTES=""
            if [[ -f "$CHANGELOG" ]]; then
              NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" "$CHANGELOG" | sed '/^[[:space:]]*$/d')
            fi

            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --title "${PLUGIN} v${VERSION}" \
              --notes "${NOTES:-Release ${TAG}}"

            RELEASED_ANYTHING=true
            echo "Released ${TAG}"
          done

          if [[ "$RELEASED_ANYTHING" != true ]]; then
            echo "Nothing to release."
          fi
