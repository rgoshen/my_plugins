name: Release plugins

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to release (e.g. cs-tutor). Defaults to all changed."
        required: false
      bump:
        description: "Override version bump (major | minor | patch). Auto-detected from commits if omitted."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changed plugins
        id: changes
        env:
          PLUGIN_INPUT: ${{ github.event.inputs.plugin }}
        run: |
          if [ -n "$PLUGIN_INPUT" ]; then
            echo "plugins=$PLUGIN_INPUT" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep "^plugins/" | cut -d'/' -f2 | sort -u | tr '\n' ' ')
            echo "plugins=${CHANGED}" >> $GITHUB_OUTPUT
            echo "Detected changed plugins: ${CHANGED}"
          fi

      - name: Release each changed plugin
        if: steps.changes.outputs.plugins != ''
        env:
          BUMP_OVERRIDE: ${{ github.event.inputs.bump }}
          PLUGINS: ${{ steps.changes.outputs.plugins }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bump_semver() {
            local version="$1" bump="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "${major}.$((minor + 1)).0" ;;
              patch) echo "${major}.${minor}.$((patch + 1))" ;;
            esac
          }

          detect_bump() {
            local commits="$1"
            if echo "$commits" | grep -qE "^(feat|fix|refactor|perf|chore)(\(.+\))?!:|BREAKING CHANGE"; then
              echo "major"
            elif echo "$commits" | grep -qE "^feat(\(.+\))?:"; then
              echo "minor"
            elif echo "$commits" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
              echo "patch"
            else
              echo "none"
            fi
          }

          generate_changelog_section() {
            local commits="$1" version="$2" date="$3"
            local breaking="" added="" fixed="" changed="" perf=""

            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -qE "BREAKING CHANGE|(\(.+\))?!:"; then
                breaking+="- ${line}"$'\n'
              elif echo "$line" | grep -qE "^feat(\(.+\))?:"; then
                added+="- ${line#feat*: }"$'\n'
              elif echo "$line" | grep -qE "^fix(\(.+\))?:"; then
                fixed+="- ${line#fix*: }"$'\n'
              elif echo "$line" | grep -qE "^(refactor|chore)(\(.+\))?:"; then
                changed+="- ${line#*: }"$'\n'
              elif echo "$line" | grep -qE "^perf(\(.+\))?:"; then
                perf+="- ${line#perf*: }"$'\n'
              fi
            done <<< "$commits"

            local section="## [${version}] - ${date}"$'\n'
            [[ -n "$breaking" ]] && section+=$'\n'"### Breaking Changes"$'\n'"${breaking}"
            [[ -n "$added"    ]] && section+=$'\n'"### Added"$'\n'"${added}"
            [[ -n "$fixed"    ]] && section+=$'\n'"### Fixed"$'\n'"${fixed}"
            [[ -n "$changed"  ]] && section+=$'\n'"### Changed"$'\n'"${changed}"
            [[ -n "$perf"     ]] && section+=$'\n'"### Performance"$'\n'"${perf}"
            echo "$section"
          }

          RELEASED_ANYTHING=false

          for PLUGIN in $PLUGINS; do
            PLUGIN_DIR="plugins/${PLUGIN}"
            PLUGIN_JSON="${PLUGIN_DIR}/.claude-plugin/plugin.json"
            CHANGELOG="${PLUGIN_DIR}/CHANGELOG.md"
            README="${PLUGIN_DIR}/README.md"

            [[ ! -f "$PLUGIN_JSON" ]] && { echo "No plugin.json for ${PLUGIN}, skipping."; continue; }

            CURRENT_VERSION=$(jq -r '.version' "$PLUGIN_JSON")
            LAST_TAG="${PLUGIN}-v${CURRENT_VERSION}"

            if git rev-parse --verify "refs/tags/${LAST_TAG}" >/dev/null 2>&1; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s" -- "${PLUGIN_DIR}/" 2>/dev/null || true)
            else
              COMMITS=$(git log --format="%s" -- "${PLUGIN_DIR}/" 2>/dev/null || true)
            fi

            [[ -z "$COMMITS" ]] && { echo "No commits for ${PLUGIN} since ${LAST_TAG}, skipping."; continue; }

            if [[ -n "$BUMP_OVERRIDE" ]]; then
              BUMP="$BUMP_OVERRIDE"
            else
              BUMP=$(detect_bump "$COMMITS")
            fi

            [[ "$BUMP" == "none" ]] && { echo "No releasable commits for ${PLUGIN}, skipping."; continue; }

            NEW_VERSION=$(bump_semver "$CURRENT_VERSION" "$BUMP")
            NEW_TAG="${PLUGIN}-v${NEW_VERSION}"
            RELEASE_DATE=$(date +%Y-%m-%d)

            echo "Releasing ${PLUGIN}: ${CURRENT_VERSION} → ${NEW_VERSION} (${BUMP})"

            # Update plugin.json version
            jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN_JSON" > /tmp/plugin.json.tmp
            mv /tmp/plugin.json.tmp "$PLUGIN_JSON"

            # Generate changelog section and prepend to CHANGELOG.md
            SECTION=$(generate_changelog_section "$COMMITS" "$NEW_VERSION" "$RELEASE_DATE")

            if [[ -f "$CHANGELOG" ]]; then
              awk -v section="$SECTION" '
                /^# Changelog/ { print; print ""; print section; next }
                { print }
              ' "$CHANGELOG" > /tmp/changelog.tmp
              mv /tmp/changelog.tmp "$CHANGELOG"
            else
              {
                echo "# Changelog"
                echo ""
                echo "All notable changes to the \`${PLUGIN}\` plugin."
                echo ""
                echo "$SECTION"
              } > "$CHANGELOG"
            fi

            # Update version badge in plugin README
            # Pattern: version-v<semver>-blue (shields.io path segment)
            if [[ -f "$README" ]]; then
              sed -i "s|version-v[0-9]*\.[0-9]*\.[0-9]*-blue|version-v${NEW_VERSION}-blue|g" "$README"
            fi

            # Update per-plugin version badge in root README
            # shields.io encodes '-' as '--' in URL path segments, so cs-tutor → cs--tutor
            PLUGIN_URL=$(echo "$PLUGIN" | sed 's/-/--/g')
            if [[ -f "README.md" ]]; then
              sed -i "s|${PLUGIN_URL}-v[0-9]*\.[0-9]*\.[0-9]*-blue|${PLUGIN_URL}-v${NEW_VERSION}-blue|g" "README.md"
            fi

            # Commit, tag, release
            git add "$PLUGIN_JSON" "$CHANGELOG"
            [[ -f "$README" ]] && git add "$README"
            git add "README.md" 2>/dev/null || true

            git commit -m "chore(${PLUGIN}): release v${NEW_VERSION}"
            git tag "$NEW_TAG"

            gh release create "$NEW_TAG" \
              --title "${PLUGIN} v${NEW_VERSION}" \
              --notes "$SECTION"

            RELEASED_ANYTHING=true
            echo "Released ${NEW_TAG}"
          done

          if [[ "$RELEASED_ANYTHING" == true ]]; then
            git push origin main --tags
          else
            echo "Nothing to release."
          fi
