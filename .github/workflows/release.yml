name: Release plugins

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to release (e.g. cs-tutor). Defaults to all changed."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugins to release
        id: changes
        env:
          PLUGIN_INPUT: ${{ github.event.inputs.plugin }}
        run: |
          if [ -n "$PLUGIN_INPUT" ]; then
            echo "plugins=$PLUGIN_INPUT" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep "^plugins/" | cut -d'/' -f2 | sort -u | tr '\n' ' ')
            echo "plugins=${CHANGED}" >> $GITHUB_OUTPUT
            echo "Detected changed plugins: ${CHANGED}"
          fi

      - name: Create releases for changed plugins
        if: steps.changes.outputs.plugins != ''
        env:
          PLUGINS: ${{ steps.changes.outputs.plugins }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASED_ANYTHING=false

          for PLUGIN in $PLUGINS; do
            PLUGIN_DIR="plugins/${PLUGIN}"
            PLUGIN_JSON="${PLUGIN_DIR}/.claude-plugin/plugin.json"
            CHANGELOG="${PLUGIN_DIR}/CHANGELOG.md"

            [[ ! -f "$PLUGIN_JSON" ]] && { echo "No plugin.json for ${PLUGIN}, skipping."; continue; }

            VERSION=$(jq -r '.version' "$PLUGIN_JSON")
            TAG="${PLUGIN}-v${VERSION}"

            if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
              echo "${TAG} already released, skipping."
              continue
            fi

            # Extract release notes from the matching CHANGELOG section
            NOTES=""
            if [[ -f "$CHANGELOG" ]]; then
              NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" "$CHANGELOG" | sed '/^[[:space:]]*$/d')
            fi

            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --title "${PLUGIN} v${VERSION}" \
              --notes "${NOTES:-Release ${TAG}}"

            RELEASED_ANYTHING=true
            echo "Released ${TAG}"
          done

          if [[ "$RELEASED_ANYTHING" != true ]]; then
            echo "Nothing to release."
          fi
